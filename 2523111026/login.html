<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户登录 - 百米短跑巨星馆</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box{
            width: 420px;
            margin: 80px auto;
            background:#fff;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 12px rgba(0,0,0,0.1);
        }
        .login-box h2{
            text-align:center;
            color:#002244;
            margin-bottom:30px;
        }
        .item{
            margin-bottom:20px;
        }
        .item input{
            width:100%;
            height:44px;
            padding:0 15px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }
        .login-btn{
            width:100%;
            height:46px;
            background:#002244;
            color:#fff;
            border:none;
            border-radius:5px;
            font-size:17px;
            cursor:pointer;
        }
        .login-btn:hover{
            background:#ffcc00;
            color:#002244;
        }
        .tip{
            text-align:center;
            margin-top:15px;
        }
        .tip a{
            color:#002244;
        }
    </style>
</head>
<body>
<div id="head">
    <div class="con header-wrap">
        <a href="index.html" class="header-logo">百米短跑巨星馆</a>
        <div class="header-nav">
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="star-list.html">传奇巨星</a></li>
                <li><a href="world-record.html">世界纪录</a></li>
                <li><a href="game-video.html">赛事集锦</a></li>
                <li><a href="sprint-knowledge.html">短跑科普</a></li>
            </ul>
        </div>
        <div class="header-right">
            <a href="login.html" style="background:#ffcc00;color:#002244">登录</a>
            <a href="register.html">注册</a>
        </div>
    </div>
</div>

<div class="content con">
    <div class="login-box">
        <h2>账号登录</h2>
        <div class="item">
            <input type="text" placeholder="请输入用户名">
        </div>
        <div class="item">
            <input type="password" placeholder="请输入密码">
        </div>
        <button class="login-btn">立即登录</button>
        <div class="tip">
            没有账号？<a href="register.html">前往注册</a>
        </div>
        <a href=" index.html" class="back-index" style="text-align:center;display:block;margin-top:20px">← 返回首页</a>
    </div>
</div>

<div id="footer">
    <div class="con">
        <div class="footer-top">
            <a href="#head">返回顶部</a>
            <a href="index.html">首页</a>
        </div>
        <div class="footer-copyright">
            Copyright © 2026 世界百米短跑巨星馆 版权所有 | 鲁ICP备12345678号
        </div>
    </div>
</div>
</body>
</html>
